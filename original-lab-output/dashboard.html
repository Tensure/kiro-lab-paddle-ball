<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Dashboard</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    rgba(255,255,255,0.08);
      --text:      #e8eaf0;
      --muted:     #7b82a0;
      --accent1:   #7c6af7;   /* purple  */
      --accent2:   #3ecfcf;   /* teal    */
      --accent3:   #f7a26a;   /* orange  */
      --accent4:   #f76a8a;   /* pink    */
      --accent5:   #6af7a2;   /* green   */
      --radius:    16px;
      --shadow:    0 8px 32px rgba(0,0,0,0.45);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
    }

    h1.dashboard-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Grid layout ──────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Card ─────────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(0,0,0,0.55); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .card-icon {
      font-size: 1.4rem;
      line-height: 1;
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Quote card ───────────────────────────────────────────────────────────── */
    #quote-card { grid-column: 1 / -1; }

    .quote-text {
      font-size: 1.25rem;
      font-style: italic;
      line-height: 1.65;
      color: var(--text);
      position: relative;
      padding-left: 20px;
    }
    .quote-text::before {
      content: '"';
      position: absolute;
      left: 0;
      top: -4px;
      font-size: 2.5rem;
      line-height: 1;
      color: var(--accent1);
      font-style: normal;
    }
    .quote-author {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--muted);
      text-align: right;
    }
    .quote-author span { color: var(--accent2); font-weight: 600; }

    .btn-refresh {
      margin-top: 18px;
      background: none;
      border: 1px solid var(--accent1);
      color: var(--accent1);
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-refresh:hover { background: var(--accent1); color: #fff; }

    /* ── Weather card ─────────────────────────────────────────────────────────── */
    .weather-main {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .weather-icon-big { font-size: 4rem; line-height: 1; }
    .weather-temp {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent3);
      line-height: 1;
    }
    .weather-unit { font-size: 1.2rem; color: var(--muted); }
    .weather-desc {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: capitalize;
    }
    .weather-location {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .weather-details {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .weather-detail {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .weather-detail-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .weather-detail-value { font-size: 0.95rem; font-weight: 600; color: var(--text); }

    .weather-city-form {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .weather-city-form input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .weather-city-form input:focus { border-color: var(--accent2); }
    .weather-city-form button {
      background: var(--accent2);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: #0f1117;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .weather-city-form button:hover { opacity: 0.85; }

    .weather-error { color: var(--accent4); font-size: 0.82rem; margin-top: 8px; }
    .weather-loading { color: var(--muted); font-size: 0.9rem; }

    /* ── Task tracker card ────────────────────────────────────────────────────── */
    #tasks-card { grid-column: 1 / -1; }

    .tasks-summary {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tasks-summary-count {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent5);
    }
    .tasks-summary-label { font-size: 0.9rem; color: var(--muted); }

    /* Add task form */
    .add-task-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .add-task-form input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-task-form input[type="text"]:focus { border-color: var(--accent5); }
    .add-task-form input[type="number"] {
      width: 80px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 10px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .add-task-form input[type="number"]:focus { border-color: var(--accent5); }
    .add-task-form button {
      background: var(--accent5);
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      color: #0f1117;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .add-task-form button:hover { opacity: 0.85; }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 14px; }

    .task-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color 0.2s;
    }
    .task-item.done { opacity: 0.55; }

    .task-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .task-checkbox {
      width: 18px;
      height: 18px;
      accent-color: var(--accent5);
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-name {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .task-item.done .task-name { text-decoration: line-through; color: var(--muted); }

    .task-pct { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }

    .task-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .task-slider {
      flex: 1;
      accent-color: var(--accent1);
      cursor: pointer;
    }
    .task-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }
    .task-delete:hover { color: var(--accent4); }

    /* Progress bar */
    .progress-bar-track {
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.35s ease;
    }

    /* Color palette for progress bars */
    .color-0 { background: linear-gradient(90deg, #7c6af7, #a78bfa); }
    .color-1 { background: linear-gradient(90deg, #3ecfcf, #67e8f9); }
    .color-2 { background: linear-gradient(90deg, #f7a26a, #fbbf24); }
    .color-3 { background: linear-gradient(90deg, #f76a8a, #f9a8d4); }
    .color-4 { background: linear-gradient(90deg, #6af7a2, #86efac); }
    .color-5 { background: linear-gradient(90deg, #f76af7, #e879f9); }
    .color-6 { background: linear-gradient(90deg, #6aaff7, #93c5fd); }
    .color-7 { background: linear-gradient(90deg, #f7f76a, #fde68a); }

    .empty-tasks {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 24px 0;
    }

    /* ── Responsive ───────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 20px 14px; }
      .add-task-form { flex-wrap: wrap; }
      .add-task-form input[type="number"] { width: 70px; }
    }
  </style>
</head>
<body>

  <h1 class="dashboard-title">✦ My Productivity Dashboard</h1>

  <div class="grid">

    <!-- ── Quote card ──────────────────────────────────────────────────────────── -->
    <div class="card" id="quote-card">
      <div class="card-header">
        <span class="card-icon">💡</span>
        <span class="card-title">Daily Motivation</span>
      </div>
      <p class="quote-text" id="quote-text">Loading quote…</p>
      <p class="quote-author">— <span id="quote-author"></span></p>
      <button class="btn-refresh" id="quote-refresh">New Quote</button>
    </div>

    <!-- ── Weather card ────────────────────────────────────────────────────────── -->
    <div class="card" id="weather-card">
      <div class="card-header">
        <span class="card-icon">🌤</span>
        <span class="card-title">Current Weather</span>
      </div>
      <div id="weather-body">
        <p class="weather-loading">Enter a city to load weather…</p>
      </div>
      <form class="weather-city-form" id="weather-form" autocomplete="off">
        <input type="text" id="city-input" placeholder="City name…" aria-label="City name" />
        <button type="submit">Go</button>
      </form>
      <p class="weather-error" id="weather-error" hidden></p>
    </div>

    <!-- ── Task tracker card ───────────────────────────────────────────────────── -->
    <div class="card" id="tasks-card">
      <div class="card-header">
        <span class="card-icon">✅</span>
        <span class="card-title">Task Tracker</span>
      </div>

      <div class="tasks-summary">
        <span class="tasks-summary-count" id="tasks-done-count">0</span>
        <span class="tasks-summary-label" id="tasks-done-label">of 0 tasks completed</span>
      </div>

      <form class="add-task-form" id="add-task-form">
        <input type="text" id="task-name-input" placeholder="New task…" aria-label="Task name" required />
        <input type="number" id="task-progress-input" min="0" max="100" value="0" aria-label="Initial progress %" title="Initial progress %" />
        <button type="submit">+ Add</button>
      </form>

      <div class="task-list" id="task-list">
        <p class="empty-tasks" id="empty-tasks">No tasks yet. Add one above!</p>
      </div>
    </div>

  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════════════════════
       QUOTES
    ═══════════════════════════════════════════════════════════════════════════ */
    const QUOTES = [
      { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
      { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
      { text: "Act as if what you do makes a difference. It does.", author: "William James" },
      { text: "Quality is not an act, it is a habit.", author: "Aristotle" },
      { text: "Well done is better than well said.", author: "Benjamin Franklin" },
      { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Everything you've ever wanted is on the other side of fear.", author: "George Addair" },
      { text: "Dream big and dare to fail.", author: "Norman Vaughan" },
      { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
    ];

    let lastQuoteIndex = -1;

    function showRandomQuote() {
      let idx;
      do { idx = Math.floor(Math.random() * QUOTES.length); } while (idx === lastQuoteIndex);
      lastQuoteIndex = idx;
      const q = QUOTES[idx];
      document.getElementById('quote-text').textContent = q.text;
      document.getElementById('quote-author').textContent = q.author;
    }

    document.getElementById('quote-refresh').addEventListener('click', showRandomQuote);
    showRandomQuote();

    /* ═══════════════════════════════════════════════════════════════════════════
       WEATHER  (Open-Meteo — free, no API key required)
       Geocoding: https://geocoding-api.open-meteo.com
       Forecast:  https://api.open-meteo.com
    ═══════════════════════════════════════════════════════════════════════════ */
    const WMO_CODES = {
      0:  { label: 'Clear sky',          icon: '☀️' },
      1:  { label: 'Mainly clear',       icon: '🌤️' },
      2:  { label: 'Partly cloudy',      icon: '⛅' },
      3:  { label: 'Overcast',           icon: '☁️' },
      45: { label: 'Foggy',              icon: '🌫️' },
      48: { label: 'Icy fog',            icon: '🌫️' },
      51: { label: 'Light drizzle',      icon: '🌦️' },
      53: { label: 'Drizzle',            icon: '🌦️' },
      55: { label: 'Heavy drizzle',      icon: '🌧️' },
      61: { label: 'Slight rain',        icon: '🌧️' },
      63: { label: 'Rain',               icon: '🌧️' },
      65: { label: 'Heavy rain',         icon: '🌧️' },
      71: { label: 'Slight snow',        icon: '🌨️' },
      73: { label: 'Snow',               icon: '❄️' },
      75: { label: 'Heavy snow',         icon: '❄️' },
      80: { label: 'Rain showers',       icon: '🌦️' },
      81: { label: 'Rain showers',       icon: '🌧️' },
      82: { label: 'Violent showers',    icon: '⛈️' },
      95: { label: 'Thunderstorm',       icon: '⛈️' },
      96: { label: 'Thunderstorm + hail',icon: '⛈️' },
      99: { label: 'Thunderstorm + hail',icon: '⛈️' },
    };

    function wmoInfo(code) {
      return WMO_CODES[code] || { label: 'Unknown', icon: '🌡️' };
    }

    function setWeatherError(msg) {
      const el = document.getElementById('weather-error');
      el.textContent = msg;
      el.hidden = false;
    }
    function clearWeatherError() {
      document.getElementById('weather-error').hidden = true;
    }

    function renderWeather(data) {
      const { name, country, temp, feelsLike, humidity, windspeed, wmo } = data;
      const info = wmoInfo(wmo);
      document.getElementById('weather-body').innerHTML = `
        <div class="weather-main">
          <div class="weather-icon-big">${info.icon}</div>
          <div>
            <div class="weather-temp">${Math.round(temp)}<span class="weather-unit">°C</span></div>
            <div class="weather-desc">${info.label}</div>
            <div class="weather-location">📍 ${name}, ${country}</div>
          </div>
        </div>
        <div class="weather-details">
          <div class="weather-detail">
            <span class="weather-detail-label">Feels like</span>
            <span class="weather-detail-value">${Math.round(feelsLike)}°C</span>
          </div>
          <div class="weather-detail">
            <span class="weather-detail-label">Humidity</span>
            <span class="weather-detail-value">${humidity}%</span>
          </div>
          <div class="weather-detail">
            <span class="weather-detail-label">Wind</span>
            <span class="weather-detail-value">${Math.round(windspeed)} km/h</span>
          </div>
        </div>
      `;
    }

    async function fetchWeather(city) {
      clearWeatherError();
      document.getElementById('weather-body').innerHTML = '<p class="weather-loading">Fetching weather…</p>';

      try {
        // Step 1: geocode
        const geoRes = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
        );
        if (!geoRes.ok) throw new Error('Geocoding request failed.');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) {
          throw new Error(`City "${city}" not found. Try a different name.`);
        }
        const { latitude, longitude, name, country } = geoData.results[0];

        // Step 2: weather
        const wxRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
          `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code` +
          `&temperature_unit=celsius&wind_speed_unit=kmh&timezone=auto`
        );
        if (!wxRes.ok) throw new Error('Weather request failed.');
        const wxData = await wxRes.json();
        const cur = wxData.current;

        renderWeather({
          name,
          country,
          temp:       cur.temperature_2m,
          feelsLike:  cur.apparent_temperature,
          humidity:   cur.relative_humidity_2m,
          windspeed:  cur.wind_speed_10m,
          wmo:        cur.weather_code,
        });

        // Persist last city
        localStorage.setItem('dashboard_city', city);

      } catch (err) {
        document.getElementById('weather-body').innerHTML = '<p class="weather-loading">—</p>';
        setWeatherError(err.message || 'Could not load weather.');
      }
    }

    document.getElementById('weather-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const city = document.getElementById('city-input').value.trim();
      if (city) fetchWeather(city);
    });

    // Auto-load last city
    const savedCity = localStorage.getItem('dashboard_city');
    if (savedCity) {
      document.getElementById('city-input').value = savedCity;
      fetchWeather(savedCity);
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       TASK TRACKER
    ═══════════════════════════════════════════════════════════════════════════ */
    const COLOR_COUNT = 8;
    let tasks = [];
    let nextId = 1;

    function saveTasks() {
      localStorage.setItem('dashboard_tasks', JSON.stringify({ tasks, nextId }));
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem('dashboard_tasks');
        if (!raw) return;
        const parsed = JSON.parse(raw);
        tasks  = parsed.tasks  || [];
        nextId = parsed.nextId || 1;
      } catch { /* ignore */ }
    }

    function updateSummary() {
      const done  = tasks.filter(t => t.progress === 100).length;
      const total = tasks.length;
      document.getElementById('tasks-done-count').textContent = done;
      document.getElementById('tasks-done-label').textContent =
        `of ${total} task${total !== 1 ? 's' : ''} completed`;
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      const empty = document.getElementById('empty-tasks');

      if (tasks.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        empty.hidden = false;
        updateSummary();
        return;
      }
      empty.hidden = true;

      list.innerHTML = '';
      tasks.forEach((task) => {
        const colorClass = `color-${task.colorIndex % COLOR_COUNT}`;
        const isDone = task.progress === 100;

        const item = document.createElement('div');
        item.className = `task-item${isDone ? ' done' : ''}`;
        item.dataset.id = task.id;

        item.innerHTML = `
          <div class="task-item-header">
            <input type="checkbox" class="task-checkbox" aria-label="Mark complete"
              ${isDone ? 'checked' : ''} />
            <span class="task-name">${escapeHtml(task.name)}</span>
            <span class="task-pct">${task.progress}%</span>
          </div>
          <div class="task-controls">
            <input type="range" class="task-slider" min="0" max="100"
              value="${task.progress}" aria-label="Progress for ${escapeHtml(task.name)}" />
            <button class="task-delete" title="Delete task" aria-label="Delete task">🗑</button>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill ${colorClass}" style="width:${task.progress}%"></div>
          </div>
        `;

        // Checkbox toggles 0 ↔ 100
        item.querySelector('.task-checkbox').addEventListener('change', (e) => {
          updateTaskProgress(task.id, e.target.checked ? 100 : 0);
        });

        // Slider
        item.querySelector('.task-slider').addEventListener('input', (e) => {
          updateTaskProgress(task.id, parseInt(e.target.value, 10));
        });

        // Delete
        item.querySelector('.task-delete').addEventListener('click', () => {
          deleteTask(task.id);
        });

        list.appendChild(item);
      });

      updateSummary();
    }

    function updateTaskProgress(id, progress) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      task.progress = progress;
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    }

    function addTask(name, initialProgress) {
      tasks.push({
        id:         nextId++,
        name,
        progress:   Math.min(100, Math.max(0, initialProgress)),
        colorIndex: (nextId - 2) % COLOR_COUNT,
      });
      saveTasks();
      renderTasks();
    }

    document.getElementById('add-task-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const nameInput = document.getElementById('task-name-input');
      const progInput = document.getElementById('task-progress-input');
      const name = nameInput.value.trim();
      if (!name) return;
      addTask(name, parseInt(progInput.value, 10) || 0);
      nameInput.value = '';
      progInput.value = '0';
      nameInput.focus();
    });

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Bootstrap
    loadTasks();
    renderTasks();
  </script>
</body>
</html>
