<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paddle Ball Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: navy;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    canvas {
      display: block;
      background-color: navy;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="300"></canvas>

  <script>
    // ─── Canvas setup ────────────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    // ─── Constants ───────────────────────────────────────────────────────────────
    const CANVAS_W      = canvas.width;   // 600
    const CANVAS_H      = canvas.height;  // 300
    const PADDLE_W      = 10;
    const PADDLE_H      = 80;
    const PADDLE_SPEED  = 5;
    const BALL_RADIUS   = 8;
    const BALL_SPEED    = 4;
    const AI_FACTOR     = 0.6;   // AI moves 60% of the distance to ball per frame
    const WIN_SCORE     = 7;

    // Colors
    const COLOR_BG      = 'navy';
    const COLOR_BALL    = 'white';
    const COLOR_PADDLE  = 'orange';
    const COLOR_DIVIDER = 'rgba(255,255,255,0.15)';

    // ─── Game state ──────────────────────────────────────────────────────────────
    let ball, leftY, rightY, leftScore, rightScore, gameOver, intervalId;
    let keys = {};

    // ─── Initialization ──────────────────────────────────────────────────────────
    function initBall() {
      // Random direction: angle between -45° and 45°, randomly left or right
      const angle = (Math.random() * Math.PI / 2) - Math.PI / 4;
      const dir   = Math.random() < 0.5 ? 1 : -1;
      ball = {
        x:  CANVAS_W / 2,
        y:  CANVAS_H / 2,
        dx: dir * BALL_SPEED * Math.cos(angle),
        dy: BALL_SPEED * Math.sin(angle),
        speed: BALL_SPEED
      };
    }

    function initGame() {
      leftY      = (CANVAS_H - PADDLE_H) / 2;
      rightY     = (CANVAS_H - PADDLE_H) / 2;
      leftScore  = 0;
      rightScore = 0;
      gameOver   = false;
      initBall();
    }

    // ─── Input handling (Task 5) ─────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
        e.preventDefault(); // prevent page scrolling
      }
      // Restart on Space when game is over
      if (e.code === 'Space' && gameOver) {
        restartGame();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // Click to restart after win
    canvas.addEventListener('click', () => {
      if (gameOver) restartGame();
    });

    // ─── AI for left paddle (Task 6) ─────────────────────────────────────────────
    function updateAI() {
      const paddleCenter = leftY + PADDLE_H / 2;
      const diff         = ball.y - paddleCenter;
      leftY += diff * AI_FACTOR;
      // Clamp within canvas
      leftY = Math.max(0, Math.min(CANVAS_H - PADDLE_H, leftY));
    }

    // ─── Player input for right paddle (Task 5) ──────────────────────────────────
    function updatePlayer() {
      if (keys['ArrowUp'])   rightY -= PADDLE_SPEED;
      if (keys['ArrowDown']) rightY += PADDLE_SPEED;
      // Clamp within canvas
      rightY = Math.max(0, Math.min(CANVAS_H - PADDLE_H, rightY));
    }

    // ─── Ball movement & collision detection (Task 4) ────────────────────────────
    function updateBall() {
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Top / bottom wall bounce (Req 2.2)
      if (ball.y - BALL_RADIUS <= 0) {
        ball.y  = BALL_RADIUS;
        ball.dy = Math.abs(ball.dy);
      } else if (ball.y + BALL_RADIUS >= CANVAS_H) {
        ball.y  = CANVAS_H - BALL_RADIUS;
        ball.dy = -Math.abs(ball.dy);
      }

      // Left paddle collision (Req 2.1)
      const leftPaddleX = 10;
      if (
        ball.dx < 0 &&
        ball.x - BALL_RADIUS <= leftPaddleX + PADDLE_W &&
        ball.x - BALL_RADIUS >= leftPaddleX &&
        ball.y >= leftY &&
        ball.y <= leftY + PADDLE_H
      ) {
        ball.x  = leftPaddleX + PADDLE_W + BALL_RADIUS;
        ball.dx = Math.abs(ball.dx);
        // Slight speed increase on each hit (polish)
        increaseSpeed();
      }

      // Right paddle collision (Req 2.1)
      const rightPaddleX = CANVAS_W - PADDLE_W - 10;
      if (
        ball.dx > 0 &&
        ball.x + BALL_RADIUS >= rightPaddleX &&
        ball.x + BALL_RADIUS <= rightPaddleX + PADDLE_W &&
        ball.y >= rightY &&
        ball.y <= rightY + PADDLE_H
      ) {
        ball.x  = rightPaddleX - BALL_RADIUS;
        ball.dx = -Math.abs(ball.dx);
        increaseSpeed();
      }

      // Ball off left edge → right player scores (Req 2.3)
      if (ball.x + BALL_RADIUS < 0) {
        rightScore++;
        checkWin();
        initBall();
      }

      // Ball off right edge → left (AI) player scores (Req 2.3)
      if (ball.x - BALL_RADIUS > CANVAS_W) {
        leftScore++;
        checkWin();
        initBall();
      }
    }

    function increaseSpeed() {
      const maxSpeed = BALL_SPEED * 2.5;
      const factor   = 1.05;
      const newSpeed = Math.min(Math.hypot(ball.dx, ball.dy) * factor, maxSpeed);
      const angle    = Math.atan2(ball.dy, ball.dx);
      ball.dx = newSpeed * Math.cos(angle);
      ball.dy = newSpeed * Math.sin(angle);
    }

    function checkWin() {
      if (leftScore >= WIN_SCORE || rightScore >= WIN_SCORE) {
        gameOver = true;
      }
    }

    // ─── Drawing (Task 3 + Task 8) ────────────────────────────────────────────────
    function draw() {
      // Clear canvas with background color (Req 3.3)
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Center dividing line (polish)
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = COLOR_DIVIDER;
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.moveTo(CANVAS_W / 2, 0);
      ctx.lineTo(CANVAS_W / 2, CANVAS_H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw paddles as orange rectangles (Req 3.1)
      ctx.fillStyle = COLOR_PADDLE;
      ctx.fillRect(10, leftY, PADDLE_W, PADDLE_H);
      ctx.fillRect(CANVAS_W - PADDLE_W - 10, rightY, PADDLE_W, PADDLE_H);

      // Draw ball as white circle (Req 3.2)
      ctx.fillStyle = COLOR_BALL;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
      ctx.fill();

      // Fancy scoreboard (Task 8)
      drawScoreboard();

      // Win screen overlay
      if (gameOver) {
        drawWinScreen();
      }
    }

    function drawScoreboard() {
      const boxW  = 80;
      const boxH  = 44;
      const boxY  = 10;
      const gap   = 20; // gap from center line

      // Left score box (AI)
      const leftBoxX = CANVAS_W / 2 - gap - boxW;
      drawScoreBox(leftBoxX, boxY, boxW, boxH, 'AI', leftScore);

      // Right score box (Player)
      const rightBoxX = CANVAS_W / 2 + gap;
      drawScoreBox(rightBoxX, boxY, boxW, boxH, 'YOU', rightScore);

      // "First to 7 wins" label
      ctx.font        = '11px monospace';
      ctx.fillStyle   = 'rgba(255,255,255,0.5)';
      ctx.textAlign   = 'center';
      ctx.fillText('First to 7 wins', CANVAS_W / 2, boxY + boxH + 14);
    }

    function drawScoreBox(x, y, w, h, label, score) {
      // Box background
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      roundRect(x, y, w, h, 6);
      ctx.fill();

      // Box border
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth   = 1.5;
      roundRect(x, y, w, h, 6);
      ctx.stroke();

      // Label
      ctx.font      = 'bold 11px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText(label, x + w / 2, y + 15);

      // Score number
      ctx.font      = 'bold 22px monospace';
      ctx.fillStyle = 'white';
      ctx.fillText(score, x + w / 2, y + h - 8);
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawWinScreen() {
      const winner = leftScore >= WIN_SCORE ? 'AI Wins!' : 'You Win!';
      const color  = leftScore >= WIN_SCORE ? '#ff6b6b' : '#6bff9e';

      // Semi-transparent overlay
      ctx.fillStyle = 'rgba(0,0,20,0.72)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Winner text
      ctx.font      = 'bold 48px monospace';
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.fillText(winner, CANVAS_W / 2, CANVAS_H / 2 - 10);

      // Restart prompt
      ctx.font      = '16px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('Press Space or Click to Play Again', CANVAS_W / 2, CANVAS_H / 2 + 30);
    }

    // ─── Update (combines all per-frame logic) ────────────────────────────────────
    function update() {
      if (gameOver) return;
      updatePlayer();
      updateAI();
      updateBall();
    }

    // ─── Game loop (Task 7) ───────────────────────────────────────────────────────
    function startGameLoop() {
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(() => {
        update();
        draw();
      }, 16); // ~60 FPS (Req 3.4)
    }

    function restartGame() {
      initGame();
      // game loop already running; update() will resume because gameOver = false
    }

    // ─── Bootstrap ────────────────────────────────────────────────────────────────
    initGame();
    startGameLoop();
  </script>
</body>
</html>
